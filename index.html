<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>鍛冶ガチャRPG 完成版</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle, #1a1a1a, #000);
  color: white;
  text-align: center;
}

button {
  margin: 5px;
  padding: 10px;
  background: #ff5a00;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.common { color: #ccc; }
.rare { color: #4fc3f7; }
.epic { color: #ba68c8; }
.legend { color: gold; }

canvas {
  background: #111;
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>⚒️ 鍛冶ガチャRPG ⚔️</h1>

<div>❤️ HP: <span id="playerHP">100</span></div>

<button onclick="drawGacha()">鍛造</button>
<button onclick="attack()">攻撃（連打OK）</button>

<div id="result"></div>

<h2>🎒 武器</h2>
<div id="inventory"></div>

<h2>👹 敵</h2>
<div id="enemyInfo"></div>

<canvas id="weaponCanvas" width="150" height="150"></canvas>
<canvas id="enemyCanvas" width="150" height="150"></canvas>

<script>
const items = [
  { name: "鉄の剣", rarity: "common", rate: 50 },
  { name: "鋼の槍", rarity: "common", rate: 25 },
  { name: "ミスリルナイフ", rarity: "rare", rate: 15 },
  { name: "炎のハンマー", rarity: "epic", rate: 8 },
  { name: "竜殺しの大剣", rarity: "legend", rate: 2 }
];

let inventory = [];
let selected = null;
let enemy = null;
let playerHP = 100;

// 鍛冶制限
let forgeCount = 0;
setInterval(() => forgeCount = 0, 60000);

// 敵出現（1分ごと）
setInterval(() => {
  if (!enemy) spawnEnemy();
}, 60000);

// 初回出現
spawnEnemy();

function drawGacha() {
  if (forgeCount >= 5) {
    log("❌ 鍛造は1分に5回まで！");
    return;
  }

  forgeCount++;

  let rand = Math.random() * 100;
  let sum = 0;
  let item;

  for (let i of items) {
    sum += i.rate;
    if (rand <= sum) {
      item = {...i, level: 0};
      break;
    }
  }

  inventory.push(item);
  updateInventory();
  log(`🔥 ${item.name} 入手`);
}

function updateInventory() {
  const div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((item, i) => {
    let btn = document.createElement("button");
    btn.textContent = `${item.name}+${item.level}`;
    btn.className = item.rarity;

    btn.onclick = () => {
      selected = i;
      drawWeapon(item);
    };

    div.appendChild(btn);
  });
}

function spawnEnemy() {
  enemy = {
    name: ["スライム", "ゴーレム", "ドラゴン"][Math.floor(Math.random()*3)],
    hp: 80 + Math.floor(Math.random()*50),
    attack: 5 + Math.floor(Math.random()*10)
  };

  updateEnemy();
  drawEnemy();
  log(`👹 ${enemy.name} 出現！`);
}

function updateEnemy() {
  if (!enemy) return;
  document.getElementById("enemyInfo").innerHTML =
    `${enemy.name} HP:${enemy.hp}`;
}

function attack() {
  if (!enemy || selected === null) {
    log("武器か敵がない！");
    return;
  }

  let weapon = inventory[selected];
  let power = getPower(weapon);

  enemy.hp -= power;

  log(`⚔️ ${power}ダメージ！`);

  if (enemy.hp <= 0) {
    log(`🏆 撃破！`);
    enemy = null;
    document.getElementById("enemyInfo").innerHTML = "";
    return;
  }

  // 敵の反撃
  playerHP -= enemy.attack;
  document.getElementById("playerHP").textContent = playerHP;

  if (playerHP <= 0) {
    log("💀 ゲームオーバー");
    playerHP = 100;
    inventory = [];
    updateInventory();
  }

  updateEnemy();
}

function getPower(w) {
  let base = 5;
  if (w.rarity === "rare") base = 10;
  if (w.rarity === "epic") base = 20;
  if (w.rarity === "legend") base = 40;
  return base + w.level * 5;
}

function drawWeapon(item) {
  const ctx = document.getElementById("weaponCanvas").getContext("2d");
  ctx.clearRect(0,0,150,150);
  ctx.fillStyle = item.rarity === "legend" ? "gold" : "#aaa";
  ctx.fillRect(60, 20, 30 + item.level*2, 100);
}

function drawEnemy() {
  const ctx = document.getElementById("enemyCanvas").getContext("2d");
  ctx.clearRect(0,0,150,150);

  ctx.fillStyle = "green";

  // スライム
  if (enemy.name === "スライム") {
    ctx.beginPath();
    ctx.arc(75, 80, 40, 0, Math.PI*2);
    ctx.fill();
  }

  // ゴーレム
  if (enemy.name === "ゴーレム") {
    ctx.fillRect(40, 40, 70, 70);
  }

  // ドラゴン
  if (enemy.name === "ドラゴン") {
    ctx.beginPath();
    ctx.moveTo(30,100);
    ctx.lineTo(75,30);
    ctx.lineTo(120,100);
    ctx.closePath();
    ctx.fill();
  }
}

function log(t) {
  document.getElementById("result").innerHTML = t;
}
</script>

</body>
</html>
